name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.os }}-${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          # Linux
          - os: linux
            arch: amd64
            runner: ubuntu-latest
          - os: linux
            arch: arm64
            runner: ubuntu-latest
          # macOS
          - os: darwin
            arch: amd64
            runner: macos-13  # Intel Mac
          - os: darwin
            arch: arm64
            runner: macos-latest  # ARM Mac
          # Windows
          - os: windows
            arch: amd64
            runner: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Get version
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
        shell: bash

      - name: Build
        env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
          CGO_ENABLED: 0
        run: |
          mkdir -p bin/releases
          go build -ldflags "-s -w -X main.Version=${{ steps.version.outputs.VERSION }}" \
            -o bin/releases/email-${{ matrix.os }}-${{ matrix.arch }}${{ matrix.os == 'windows' && '.exe' || '' }} \
            ./cmd/email
        shell: bash

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: email-${{ matrix.os }}-${{ matrix.arch }}
          path: bin/releases/email-${{ matrix.os }}-${{ matrix.arch }}${{ matrix.os == 'windows' && '.exe' || '' }}
          if-no-files-found: error

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: bin/releases
          pattern: email-*
          merge-multiple: true

      - name: List artifacts
        run: ls -la bin/releases/

      - name: Get version
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ steps.version.outputs.VERSION }}
          body: |
            ## Email CLI Client ${{ steps.version.outputs.VERSION }}

            ### 功能特性
            - IMAP/POP3 收件功能
            - SMTP 发件功能
            - SQLite + FTS5 本地存储和全文搜索
            - Cobra CLI 框架
            - JSON 输出支持（AI友好）
            - 网易邮箱兼容性支持 (RFC 2971 ID命令)
            - STARTTLS 支持 (587/25端口)

            ### 下载说明
            - `darwin-arm64`: macOS (Apple Silicon M1/M2/M3)
            - `darwin-amd64`: macOS (Intel)
            - `linux-amd64`: Linux x86_64
            - `linux-arm64`: Linux ARM64
            - `windows-amd64.exe`: Windows x64

            ### 使用方式
            ```bash
            # Linux/macOS
            chmod +x email-*
            ./email-* account add --name "名称" --email "邮箱" ...

            # Windows
            email-windows-amd64.exe account add ...
            ```
          files: bin/releases/*
          draft: false
          prerelease: false